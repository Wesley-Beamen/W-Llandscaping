<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W&L landscaping</title>

<!-- Favicon -->
<link rel="icon" href="./Images/Logo.png?v=2">
<link rel="shortcut icon" href="./Images/Logo.png?v=2">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f7f2;
color:#333;
overflow-x:hidden;
}

/* NAV */
nav{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-img{
height:55px;
width:auto;
object-fit:contain;
transition:transform .3s ease;
}

.logo-img:hover{
transform:scale(1.05);
}

.logo-text{
display:flex;
flex-direction:column;
justify-content:center;
}

.logo-text h2{
margin:0;
color:#2e7d32;
font-size:1.5rem;
}

.logo-text span{
font-size:.85rem;
color:#666;
}

nav a{
margin-left:15px;
text-decoration:none;
color:#333;
display:inline-block;
transition:color .3s ease,transform .3s ease;
}

nav a:hover{
color:#2e7d32;
transform:translateY(-2px);
}

/* HERO */
.hero{
height:90vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.2)),
url("Images/grass1.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-size:3rem;
margin-bottom:15px;
text-shadow:0 3px 15px rgba(0,0,0,.3);
}

.hero p{
font-size:1.2rem;
margin-bottom:20px;
text-shadow:0 2px 10px rgba(0,0,0,.3);
}

/* BUTTON */
.btn{
background:#43a047;
color:white;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
transition:
transform .3s ease,
box-shadow .3s ease,
background .3s ease;
}

.btn:hover{
background:#2e7d32;
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(67,160,71,.35);
}

/* SECTIONS */
section{
padding:70px 20px;
}

.container{
max-width:1100px;
margin:auto;
}

.title{
text-align:center;
margin-bottom:40px;
color:#2e7d32;
font-size:2rem;
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:transform .35s ease,box-shadow .35s ease;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 18px 35px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
background:white;
padding:15px;
transition:transform .45s ease;
}

.card:hover img{
transform:scale(1.08);
}

.card-content{
padding:20px;
}

.card-content h3{
color:#2e7d32;
}

/* FORM */
.form-box{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
max-width:600px;
margin:auto;
transition:transform .3s ease,box-shadow .3s ease;
}

.form-box:hover{
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(0,0,0,.12);
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:1px solid #d5d5d5;
border-radius:10px;
font-size:15px;
transition:
border-color .25s ease,
box-shadow .25s ease,
transform .25s ease;
}

input:hover{
border-color:#43a047;
transform:translateY(-2px);
}

input:focus{
outline:none;
border-color:#2e7d32;
box-shadow:0 0 0 4px rgba(46,125,50,.15);
transform:translateY(-2px);
}

button{
width:100%;
margin-top:18px;
padding:14px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:
transform .25s ease,
background .25s ease,
box-shadow .25s ease;
}

button:hover{
background:#1b5e20;
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(46,125,50,.35);
}

button:active{
transform:translateY(0);
}

#status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
background:#1b5e20;
color:white;
}

/* ANIMATIONS */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.hero h1{
animation:fadeUp .8s ease;
}

.hero p{
animation:fadeUp 1s ease;
}

.hero .btn{
animation:fadeUp 1.2s ease;
}

.card{
animation:fadeUp .7s ease;
}

.form-box{
animation:fadeUp .8s ease;
}

/* TABLETS */
@media (max-width:768px){

nav{
flex-direction:column;
padding:15px;
gap:15px;
text-align:center;
}

nav div:last-child{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

nav a{
margin:0;
}

.logo{
flex-direction:column;
text-align:center;
gap:8px;
}

.logo-img{
height:70px;
}

.logo-text h2{
font-size:1.3rem;
}

.hero{
height:75vh;
}

.hero h1{
font-size:2rem;
line-height:1.2;
}

.hero p{
font-size:1rem;
}

.btn{
width:100%;
max-width:280px;
}

section{
padding:50px 15px;
}

.title{
font-size:1.8rem;
}

.services{
grid-template-columns:1fr;
gap:20px;
}

.card img{
height:180px;
padding:10px;
}

.card-content{
text-align:center;
}

.form-box{
padding:20px;
width:100%;
}

input,
button{
font-size:16px;
}
}

/* SMALL PHONES */
@media (max-width:480px){

.logo-img{
height:60px;
}

.logo-text h2{
font-size:1.15rem;
}

.logo-text span{
font-size:.75rem;
}

.hero{
height:70vh;
padding:15px;
}

.hero h1{
font-size:1.7rem;
}

.hero p{
font-size:.95rem;
}

.title{
font-size:1.5rem;
}

.card img{
height:150px;
}

.form-box{
padding:15px;
}

input{
padding:12px;
}

button{
padding:12px;
}
}
</style>
</head>
<body>

<nav>
    <div class="logo">
        <img src="Images/Logo.png" class="logo-img" alt="W&L Landscaping Logo">
        <div class="logo-text">
            <h2>W&L Landscaping</h2>
            <span>Lawn Care</span>
        </div>
    </div>
    <div>
        <a href="#services">Services</a>
        <a href="#book">Book</a>
    </div>
</nav>

<div class="hero">
    <div>
        <h1>Local Landscaping Services</h1>
        <p>Reliable lawn care, for cheap</p>
        <a class="btn" href="#book">Book Appointment</a>
    </div>
</div>

<section id="services">
    <div class="container">
        <h2 class="title">Our Services</h2>

        <div class="services">

            <div class="card">
                <img src="Images/Lawn-Mower.webp">
                <div class="card-content">
                    <h3>Lawn Mowing</h3>
                </div>
            </div>

            <div class="card">
                <img src="Images/Edger.webp">
                <div class="card-content">
                    <h3>Edging</h3>
                </div>
            </div>

            <div class="card">
                <img src="Images/weedwacker.jpg">
                <div class="card-content">
                    <h3>Weed Wacking</h3>
                </div>
            </div>

        </div>
    </div>
</section>

<section id="book">
    <div class="container">
        <h2 class="title">Book Appointment</h2>

        <div class="form-box">
            <form id="appointmentForm">

                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="address" placeholder="Address" required>

                <input type="date" id="date" required>
                <input type="time" id="time" required>

                <button type="submit">Submit</button>
            </form>

            <p id="status"></p>
        </div>
    </div>
</section>

<footer>
    © 2026 Landscaping Company
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCmgHZXEX3-6RT7bqEfQytHbfpxD7GMTM",
  authDomain: "landscapingform.firebaseapp.com",
  projectId: "landscapingform",
  storageBucket: "landscapingform.firebasestorage.app",
  messagingSenderId: "233664675176",
  appId: "1:233664675176:web:493b8ce3153acc9dd1eadd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("appointmentForm");
const status = document.getElementById("status");

/* EMAIL VALIDATION */
function validEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* DATE/TIME VALIDATION */
function validate(dateStr, timeStr){

    const now = new Date();
    const selected = new Date(dateStr + "T" + timeStr);

    if(selected < now){
        return "Cannot book past dates.";
    }

    const max = new Date();
    max.setFullYear(max.getFullYear() + 2);

    if(selected > max){
        return "Cannot book more than 2 years ahead.";
    }

    const hour = parseInt(timeStr.split(":")[0]);

    if(hour < 6 || hour >= 20){
        return "Bookings allowed only 6AM - 8PM.";
    }

    return null;
}

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    if(!validEmail(email)){
        status.innerText = "Invalid email format.";
        status.style.color = "red";
        return;
    }

    const error = validate(date, time);

    if(error){
        status.innerText = error;
        status.style.color = "red";
        return;
    }

    try{

        /* SAVE TO FIREBASE */
        await addDoc(collection(db,"appointments"),{
            name,
            email,
            address,
            date,
            time,
            submitted: serverTimestamp()
        });

        /* SEND EMAIL */
        await emailjs.send(
            "service_x217rhb",
            "template_7xm71fn",
            {
                name: name,
                email: email,
                address: address,
                date: date,
                time: time
            }
        );

        status.innerText = "Appointment submitted!";
        status.style.color = "green";

        form.reset();

    }catch(err){

        console.error(err);

        status.innerText = "Error submitting form.";
        status.style.color = "red";
    }

});

</script>

</body>
</html>
